<!DOCTYPE html>
<html>
<head>
    <title>My First Styled Page</title>
    <style>
        /* CSS: This part handles the design */
        body {
            background-color: #f0f8ff; /* Light blue background */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #2c3e50;
            font-size: 36px;
        }

        p {
            color: #34495e;
            font-size: 18px;
        }

        .my-button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 8px;
        }

        .my-button:hover {
            background-color: #45a049; /* Darker green on hover */
        }
    </style>
</head>
<body>

    <!-- HTML: This part handles the structure -->
    <h1>Hello, World!</h1>
    <p>This is a simple webpage structured with HTML and styled with CSS.</p>
    
    <button class="my-button">Click Me!</button>

</body>
</html>
